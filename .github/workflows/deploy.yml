name: Deploy to GitHub Pages

# Builds the extension bundles and publishes them to GitHub Pages so the repo
# can be added as a source in Paperback.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run bundle

      # Stop GitHub Pages' Jekyll from processing the output so index.js and the
      # JSON/asset files are served verbatim.
      - run: touch bundles/.nojekyll

      # Keep the custom domain across Actions deploys (the artifact must carry
      # the CNAME or Pages resets the domain on each publish).
      - run: echo 'paperback.justspirit.dev' > bundles/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: bundles

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
